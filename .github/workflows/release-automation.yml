name: Generate Automated Release PR

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This is required so GitHub Actions can see the 'main' branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get base swagger.json from main branch
        run: |
          # Try to extract the swagger file from the main branch to compare against
          git show origin/main:swagger.json > swagger_base.json || echo '{"paths":{}}' > swagger_base.json

      - name: Create or Update dev -> main PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run the script (which will now compare swagger.json vs swagger_base.json)
          PR_BODY=$(node scripts/parse_swagger.js)
          
          # Look for an existing PR from 'dev' to 'main'
          PR_NUMBER=$(gh pr list --head dev --base main --state open --json number --jq '.[0].number')
          
          # If no PR exists, create one. If it does exist, update the body!
          if [ -z "$PR_NUMBER" ]; then
            echo "No existing PR found. Creating a new one from dev to main..."
            echo "$PR_BODY" | gh pr create --head dev --base main --title "🚀 Release: dev to main" --body-file -
          else
            echo "Found existing PR #$PR_NUMBER. Updating description..."
            echo "$PR_BODY" | gh pr edit $PR_NUMBER --body-file -
          fi